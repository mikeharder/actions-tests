name: Print github-script bundled dependency versions

on:
  pull_request:

permissions:
  contents: read

jobs:
  print-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Print versions from github-script action bundle
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const actionPath = process.env.GITHUB_ACTION_PATH
            if (!actionPath) throw new Error('GITHUB_ACTION_PATH is not set')

            function pkgJsonPath(pkgName) {
              // "@actions/core" -> ["@actions","core"]
              const parts = pkgName.split('/')
              return path.join(actionPath, 'node_modules', ...parts, 'package.json')
            }

            function versionOf(pkgName) {
              try {
                const p = pkgJsonPath(pkgName)
                const json = JSON.parse(fs.readFileSync(p, 'utf8'))
                return json.version || '(no version field)'
              } catch (err) {
                return `NOT FOUND (${err.code || err.message})`
              }
            }

            const packages = [
              '@actions/core',
              '@actions/exec',
              '@actions/github',
              '@actions/glob',
              '@actions/io',
              '@octokit/core',
            ]

            const out = Object.fromEntries(packages.map(p => [p, versionOf(p)]))

            console.log(JSON.stringify({
              node: process.version,
              github_script_action_path: actionPath,
              ...out,
            }, null, 2))
