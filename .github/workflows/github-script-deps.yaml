name: Print github-script runtime dependency versions

on:
  pull_request:

permissions:
  contents: read

jobs:
  print-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Print bundled package versions
        uses: actions/github-script@v8
        with:
          script: |
            const path = require('path')
            const fs = require('fs')

            function versionOf(pkg) {
              try {
                // Resolve actual file location of the module
                const entry = require(pkg)
                const entryPath = require('module').createRequire(__filename).resolve(pkg)
                const pkgRoot = entryPath.split(`node_modules/${pkg}`)[0] + `node_modules/${pkg}`
                const pkgJson = path.join(pkgRoot, 'package.json')
                return JSON.parse(fs.readFileSync(pkgJson, 'utf8')).version
              } catch (err) {
                return `NOT FOUND (${err.code || err.message})`
              }
            }

            const packages = [
              '@actions/core',
              '@actions/exec',
              '@actions/github',
              '@actions/glob',
              '@actions/io',
              '@octokit/core',
            ]

            const result = Object.fromEntries(
              packages.map(p => [p, versionOf(p)])
            )

            console.log({
              node: process.version,
              ...result
            })
